# pytest configuration for Janus

[tool:pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Ignore directories with problematic tests
norecursedirs = _archived_legacy_planning evals e2e

# Timeout settings
timeout = 10
timeout_method = thread

# Output settings
addopts =
    --strict-markers
    --tb=short
    -ra
    --color=yes

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    macos_only: tests that require macOS-specific features
    requires_ui: tests that require UI libraries (tkinter, Qt)
    requires_llm: tests that require LLM dependencies
    requires_vision: tests that require vision/OCR dependencies
    deprecated: tests for deprecated functionality
    e2e: marks tests as end-to-end tests (black box testing)
    critical: marks tests as critical baseline tests (must pass before/after refactoring)

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:janus.stt
    ignore::PytestCollectionWarning

# Minimum Python version
minversion = 7.0
