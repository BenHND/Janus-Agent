[mypy]
# Mypy configuration for Janus project
# Type checking configuration for gradual typing adoption

# Basic options
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True

# Strict mode options (enable gradually)
# disallow_any_unimported = True
# disallow_any_expr = False
# disallow_any_decorated = False
# disallow_any_explicit = False
# disallow_any_generics = False
# disallow_subclassing_any = False

# Warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Error messages
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Miscellaneous
strict_optional = True
strict_equality = True

# Import discovery
namespace_packages = True
ignore_missing_imports = True

# Per-module options - stricter for new code
[mypy-janus.api.*]
disallow_untyped_defs = True

[mypy-janus.core.*]
disallow_untyped_defs = True

# Allow gradual adoption for existing modules
[mypy-janus.llm.*]
ignore_errors = False

[mypy-janus.stt.*]
ignore_errors = False

[mypy-janus.automation.*]
ignore_errors = False

# Third-party libraries without stubs
[mypy-whisper.*]
ignore_missing_imports = True

[mypy-pyautogui.*]
ignore_missing_imports = True

[mypy-pyperclip.*]
ignore_missing_imports = True

[mypy-pynput.*]
ignore_missing_imports = True

